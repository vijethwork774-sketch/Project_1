name: Update Naukri Resume

on:
  # Trigger on every push to master branch
  push:
    branches:
      - master

  schedule:
    # Runs 3 times daily in IST (UTC+5:30)
    # 10:00 AM IST  = 04:30 UTC
    - cron: "30 4 * * *"
    # 1:00 PM IST = 07:30 UTC
    - cron: "30 7 * * *"
    # 3:00 PM IST  = 09:30 UTC
    - cron: "30 9 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-resume:
    runs-on: self-hosted  # Runs on YOUR PC — bypasses Naukri's cloud IP block

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r reuirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run Naukri profile updater
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python updating_profile.py

      # Upload screenshots so we can debug what the browser saw
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          if-no-files-found: ignore

